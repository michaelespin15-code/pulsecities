    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Dataset",
        "name": "NYC Displacement Risk Scores",
        "description": "Daily displacement risk scores for all 178 NYC neighborhoods, derived from six public data signals: LLC property acquisitions, renovation permits, tenant complaints, eviction filings, rent-stabilized unit loss, and tax assessment spikes.",
        "url": "https://pulsecities.com",
        "license": "https://creativecommons.org/licenses/by/4.0/",
        "creator": { "@type": "Person", "name": "Michael Espin", "url": "https://pulsecities.com" },
        "temporalCoverage": "2020/..",
        "spatialCoverage": {
            "@type": "Place",
            "name": "New York City",
            "address": { "@type": "PostalAddress", "addressLocality": "New York", "addressRegion": "NY", "addressCountry": "US" }
        },
        "variableMeasured": [
            { "@type": "PropertyValue", "name": "Displacement Risk Score", "minValue": 0, "maxValue": 100 },
            { "@type": "PropertyValue", "name": "LLC Acquisition Rate" },
            { "@type": "PropertyValue", "name": "Eviction Rate" },
            { "@type": "PropertyValue", "name": "Permit Intensity" },
            { "@type": "PropertyValue", "name": "Tenant Complaint Rate" },
            { "@type": "PropertyValue", "name": "Rent-Stabilized Unit Loss" }
        ],
        "isBasedOn": [
            "https://data.cityofnewyork.us/City-Government/ACRIS-Real-Property-Master/bnx9-e6tj",
            "https://data.cityofnewyork.us/Housing-Development/Evictions/6z8x-wfk4",
            "https://data.cityofnewyork.us/Housing-Development/Building-Permits/ipu4-2q9a"
        ],
        "distribution": {
            "@type": "DataDownload",
            "encodingFormat": "application/json",
            "contentUrl": "https://pulsecities.com/api/neighborhoods"
        }
    }
    </script>

    <script>
        let _lang = localStorage.getItem('pc-lang') || 'en';
        let _liveLlc = 0, _liveEvictions = 0;

        const i18n = {
            en: {
                tagline:            "The displacement story NYC doesn't officially tell.",
                llc_label:          'LLC Transfers (30d)',
                eviction_label:     'Evictions (30d)',
                highest_risk:       'highest risk zip',
                search_placeholder: 'Enter address, ZIP, or landlord name',
                search_btn:         'Search',
                explore_map:        'Explore the Map \u2192',
                recent_findings:    'Recent Findings',
                operator_profile:   'Operator profile \u2192',
                hook_ratio:         '{ratio} LLC transfers for every eviction filed this month.',
                hook_neutral:       '{llc} LLC transfers and {evictions} eviction filings in the last 30 days',
                your_watchlist:     'Your Watchlist',
                moving_this_week:   'Moving This Week',
                sig_llc:            'LLC acquisitions',
                sig_llc_s:          'LLC acquisition',
                sig_evictions:      'evictions',
                sig_evictions_s:    'eviction',
                sig_permits:        'permit filings',
                sig_permits_s:      'permit filing',
                sig_complaints:     'tenant complaints',
                sig_complaints_s:   'tenant complaint',
            },
            es: {
                tagline:            'La historia del desplazamiento en NYC que oficialmente no se cuenta.',
                llc_label:          'transferencias LLC (30d)',
                eviction_label:     'desalojos (30d)',
                highest_risk:       'ZIP de mayor riesgo',
                search_placeholder: 'Ingrese direcci\u00f3n, c\u00f3digo postal o nombre del propietario',
                search_btn:         'Buscar',
                explore_map:        'Explorar el Mapa \u2192',
                recent_findings:    'Hallazgos Recientes',
                operator_profile:   'Perfil del operador \u2192',
                hook_ratio:         '{ratio} transferencias LLC por cada desalojo presentado este mes.',
                hook_neutral:       '{llc} transferencias LLC y {evictions} desalojos registrados este mes',
                your_watchlist:     'Tu Lista de Seguimiento',
                moving_this_week:   'Esta Semana',
                sig_llc:            'adquisiciones LLC',
                sig_llc_s:          'adquisición LLC',
                sig_evictions:      'desalojos',
                sig_evictions_s:    'desalojo',
                sig_permits:        'permisos de obra',
                sig_permits_s:      'permiso de obra',
                sig_complaints:     'quejas de inquilinos',
                sig_complaints_s:   'queja de inquilinos',
            }
        };

        function applyTranslations(lang) {
            const s = i18n[lang] || i18n.en;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (s[key] !== undefined) el.textContent = s[key];
            });
            document.querySelectorAll('[data-signal]').forEach(el => {
                const cnt   = el.dataset.count ? parseInt(el.dataset.count) : null;
                const label = moverSignalLabel(el.dataset.signal, cnt);
                el.textContent = cnt != null ? `${cnt.toLocaleString()} ${label}` : label;
            });
            const inp = document.getElementById('search-input');
            if (inp) inp.placeholder = s.search_placeholder;
            const hookEl = document.getElementById('hook-line');
            if (hookEl && parseFloat(hookEl.style.opacity) > 0 && (_liveLlc || _liveEvictions)) {
                hookEl.textContent = buildHookLine(_liveLlc, _liveEvictions);
            }
        }

        function scoreColor(score) {
            if (score == null) return '#94a3b8';
            if (score >= 70) return '#ef4444';
            if (score >= 40) return '#f97316';
            if (score >= 15) return '#eab308';
            return '#22c55e';
        }

        function scoreBorder(score) {
            if (score == null) return 'rgba(51,65,85,1)';
            if (score >= 70) return 'rgba(239,68,68,0.45)';
            if (score >= 40) return 'rgba(249,115,22,0.35)';
            if (score >= 15) return 'rgba(234,179,8,0.25)';
            return 'rgba(51,65,85,1)';
        }

        function countUpInt(el, target, duration) {
            const t0 = performance.now();
            (function step(now) {
                const p = Math.min((now - t0) / duration, 1);
                el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3))).toLocaleString();
                if (p < 1) requestAnimationFrame(step);
            })(t0);
        }

        function syncBind(key, value) {
            document.querySelectorAll(`[data-bind="${key}"]`).forEach(el => el.textContent = value);
        }

        function fadeIn(el) {
            if (!el) return;
            el.style.transition = 'opacity 0.2s ease-out, transform 0.2s ease-out';
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
        }

        function buildHookLine(llc, evictions) {
            const s = i18n[_lang] || i18n.en;
            if (!llc && !evictions) return '';
            if (evictions > 0 && llc / evictions > 1.5)
                return s.hook_ratio.replace('{ratio}', (llc / evictions).toFixed(1));
            return s.hook_neutral
                .replace('{llc}', llc.toLocaleString())
                .replace('{evictions}', evictions.toLocaleString());
        }

        function populateStats(data) {
            const llc       = data.llc_transfers_30d || 0;
            const evictions = data.evictions_30d     || 0;
            const top       = data.top_risk;
            _liveLlc        = llc;
            _liveEvictions  = evictions;

            if (top) {
                const color = scoreColor(top.score);
                const zip   = top.zip_code || '\u2014';
                const place = top.name     || '\u2014';
                const score = top.score != null ? top.score.toFixed(1) : '\u2014';

                document.getElementById('zip-code').textContent  = zip;
                document.getElementById('zip-place').textContent = place;
                const scoreEl = document.getElementById('zip-score');
                scoreEl.style.color = color;
                scoreEl.textContent = score;

                syncBind('zip-code',  zip);
                syncBind('zip-place', place);
                document.querySelectorAll('[data-bind="zip-score"]').forEach(el => {
                    el.style.color = color;
                    el.textContent = score;
                });
            }

            // Cascade: center → left → right → hook
            setTimeout(() => fadeIn(document.getElementById('stat-center')), 0);
            setTimeout(() => {
                fadeIn(document.getElementById('stat-left'));
                countUpInt(document.getElementById('llc-count'), llc, 400);
                syncBind('llc-count', llc.toLocaleString());
            }, 350);
            setTimeout(() => {
                fadeIn(document.getElementById('stat-right'));
                countUpInt(document.getElementById('eviction-count'), evictions, 400);
                syncBind('eviction-count', evictions.toLocaleString());
            }, 500);
            setTimeout(() => {
                const text = buildHookLine(llc, evictions);
                const el   = document.getElementById('hook-line');
                if (text && el) { el.textContent = text; fadeIn(el); }
            }, 680);
        }

        function renderZipCards(list) {
            const container = document.getElementById('zip-cards');
            if (!container || !list) return;
            const rankColors = ['#f97316', '#94a3b8', '#64748b'];
            list.forEach(n => {
                const color     = scoreColor(n.score);
                const rankColor = rankColors[n.rank - 1] || '#64748b';
                const isTop     = n.rank === 1;
                const card      = document.createElement('a');
                card.href        = `/map?q=${encodeURIComponent(n.zip_code)}`;
                card.className   = 'zip-card text-left rounded-lg border px-4 py-3 block';
                card.style.cssText = [
                    'background:rgba(30,41,59,0.7)',
                    `border-color:${scoreBorder(n.score)}`,
                    'min-width:min(160px,calc(50vw - 24px))',
                    'max-width:200px',
                    'text-decoration:none',
                ].join(';');
                const nameLine = [n.name, n.borough].filter(Boolean).join(' · ');
                let sigLine = '';
                if (isTop && n.signal_counts) {
                    const top2 = Object.entries(n.signal_counts)
                        .filter(([, v]) => v > 0)
                        .sort(([, a], [, b]) => b - a)
                        .slice(0, 2)
                        .map(([k, v]) => `<span data-signal="${k}" data-count="${v}">${v.toLocaleString()} ${moverSignalLabel(k, v)}</span>`)
                        .join(' · ');
                    if (top2) sigLine = `<div class="text-xs mt-0.5" style="color:rgba(148,163,184,0.85);">${top2}</div>`;
                } else if (n.dominant_signal) {
                    const lbl = moverSignalLabel(n.dominant_signal, n.raw_count);
                    const raw = n.raw_count ? `${n.raw_count.toLocaleString()} ${lbl}` : lbl;
                    if (raw) sigLine = `<div class="text-xs mt-0.5" data-signal="${n.dominant_signal}" data-count="${n.raw_count || 0}" style="color:rgba(148,163,184,0.85);">${raw}</div>`;
                }
                card.innerHTML = `
                    <div class="flex items-baseline gap-2 mb-0.5">
                        <span class="font-mono text-xs font-semibold" style="color:${rankColor};">#${n.rank}</span>
                        <span class="font-mono text-sm font-bold text-slate-100">${n.zip_code}</span>
                    </div>
                    <div class="text-xs text-slate-400 truncate mb-1">${nameLine}</div>
                    <div class="font-mono text-sm font-semibold" style="color:${color};">${n.score != null ? n.score.toFixed(1) : '\u2014'}<span style="color:#475569;font-size:10px;font-weight:400;"> / 100</span></div>
                    ${sigLine}
                `;
                container.appendChild(card);
            });
        }

        function moverSignalLabel(dominant, count) {
            const s = i18n[_lang] || i18n.en;
            const plural   = { llc_acquisitions: s.sig_llc,   evictions: s.sig_evictions,   permits: s.sig_permits,   complaint_rate: s.sig_complaints   };
            const singular = { llc_acquisitions: s.sig_llc_s, evictions: s.sig_evictions_s, permits: s.sig_permits_s, complaint_rate: s.sig_complaints_s };
            return (count === 1 ? singular[dominant] : plural[dominant]) || plural[dominant] || '';
        }

        function renderMovers(list) {
            if (!list || !list.length) return;
            const section = document.getElementById('movers-section');
            const container = document.getElementById('movers-cards');
            if (!section || !container) return;
            list.forEach(n => {
                const card = document.createElement('a');
                card.href = `/map?q=${encodeURIComponent(n.zip_code)}`;
                card.className = 'zip-card text-left rounded-lg border px-4 py-3 block';
                card.style.cssText = `background:rgba(30,41,59,0.7);border-color:${scoreBorder(n.score_now)};min-width:min(160px,calc(50vw - 24px));max-width:200px;text-decoration:none;`;
                const deltaStr = `+${n.delta.toFixed(1)} pts`;
                const label = moverSignalLabel(n.dominant_signal, n.raw_count);
                const moverSig = n.raw_count && label ? `${n.raw_count.toLocaleString()} ${label}` : label;
                const moverName = [n.name, n.borough].filter(Boolean).join(' · ');
                card.innerHTML = `
                    <div class="flex items-baseline gap-2 mb-0.5">
                        <span class="font-mono text-sm font-bold text-slate-100">${n.zip_code}</span>
                        <span class="font-mono text-xs font-semibold" style="color:#ef4444;">${deltaStr}</span>
                    </div>
                    <div class="text-xs text-slate-400 truncate mb-1">${moverName}</div>
                    ${moverSig ? `<div class="text-xs" data-signal="${n.dominant_signal || ''}" data-count="${n.raw_count || 0}" style="color:rgba(148,163,184,0.85);">${moverSig}</div>` : ''}
                `;
                container.appendChild(card);
            });
            section.style.display = '';
        }

        fetch('/api/stats')
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (!data) return;
                populateStats(data);
                renderZipCards(data.top_risk_list || []);
            })
            .catch(() => {});

        fetch('/api/neighborhoods/top-movers?limit=8')
            .then(r => r.ok ? r.json() : null)
            .then(data => { if (data) renderMovers(data.neighborhoods || []); })
            .catch(() => {});

        fetch('/api/operators/top?limit=3')
            .then(r => r.ok ? r.json() : null)
            .then(ops => {
                if (!ops || !ops.length) return;
                const container = document.getElementById('operator-cards');
                if (!container) return;
                const profileLabel = i18n[_lang]?.operator_profile || 'Operator profile →';
                ops.forEach(op => {
                    const card = document.createElement('a');
                    card.href = `/operator/${encodeURIComponent(op.operator_root)}`;
                    card.className = 'zip-card text-left rounded-lg border border-slate-700 px-4 py-3 block';
                    card.style.cssText = 'background:rgba(30,41,59,0.7);min-width:min(160px,calc(50vw - 24px));max-width:200px;text-decoration:none;';
                    card.innerHTML =
                        `<div class="font-mono text-sm font-bold text-slate-100 mb-0.5">${op.operator_root}</div>` +
                        `<div class="text-xs text-slate-500 mb-0.5">${op.llc_count} LLC${op.llc_count !== 1 ? 's' : ''} &middot; ${op.total_acquisitions} acq.</div>` +
                        `<div class="text-xs text-slate-400">${profileLabel}</div>`;
                    container.appendChild(card);
                });
            })
            .catch(() => {});

        (function loadWatchlist() {
            let zips;
            try { zips = JSON.parse(localStorage.getItem('pc-watchlist') || '[]'); } catch { zips = []; }
            if (!zips.length) return;
            Promise.all(zips.map(zip =>
                fetch(`/api/neighborhoods/${zip}/score`).then(r => r.ok ? r.json() : null).catch(() => null)
            )).then(results => {
                const section = document.getElementById('watchlist-section');
                const container = document.getElementById('watchlist-cards');
                if (!section || !container) return;
                let rendered = 0;
                results.forEach((data, i) => {
                    const zip = zips[i];
                    const score = data ? data.score : null;
                    const name = data ? (data.name || zip) : zip;
                    const color = scoreColor(score);
                    const card = document.createElement('a');
                    card.href = `/map?q=${encodeURIComponent(zip)}`;
                    card.className = 'zip-card text-left rounded-lg border border-slate-700 px-4 py-3 block relative';
                    card.style.cssText = 'background:rgba(30,41,59,0.7);min-width:min(160px,calc(50vw - 24px));max-width:200px;text-decoration:none;';
                    card.innerHTML = `
                        <button class="watch-remove absolute top-2 right-2 text-slate-600 hover:text-slate-300 transition-colors leading-none" data-zip="${zip}" style="font-size:14px;background:none;border:none;cursor:pointer;min-height:36px;min-width:36px;" aria-label="Remove">&#10005;</button>
                        <div class="font-mono text-sm font-bold text-slate-100 mb-0.5 pr-4">${zip}</div>
                        <div class="text-xs text-slate-400 truncate mb-1">${name}</div>
                        <div class="font-mono text-sm font-semibold" style="color:${color};">${score != null ? score.toFixed(1) : '\u2014'}</div>
                    `;
                    card.querySelector('.watch-remove').addEventListener('click', e => {
                        e.preventDefault();
                        e.stopPropagation();
                        let list;
                        try { list = JSON.parse(localStorage.getItem('pc-watchlist') || '[]'); } catch { list = []; }
                        list = list.filter(z => z !== zip);
                        localStorage.setItem('pc-watchlist', JSON.stringify(list));
                        card.remove();
                        if (!container.children.length) section.style.display = 'none';
                    });
                    container.appendChild(card);
                    rendered++;
                });
                if (rendered) section.style.display = '';
            });
        })();

        function handleSearch() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) return;
            plausible('Search', { props: { source: 'landing' } });
            window.location.href = `/map?q=${encodeURIComponent(q)}`;
        }

        document.getElementById('search-btn').addEventListener('click', handleSearch);
        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSearch();
        });
        document.getElementById('cta-explore').addEventListener('click', () => plausible('Explore Map'));

        const langToggle = document.getElementById('lang-toggle');
        langToggle.textContent = _lang === 'es' ? 'ES / EN' : 'EN / ES';
        langToggle.addEventListener('click', () => {
            _lang = _lang === 'en' ? 'es' : 'en';
            localStorage.setItem('pc-lang', _lang);
            langToggle.textContent = _lang === 'es' ? 'ES / EN' : 'EN / ES';
            applyTranslations(_lang);
        });

        applyTranslations(_lang);
    </script>
