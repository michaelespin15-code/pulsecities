<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PulseCities — NYC Displacement Risk Intelligence</title>

    <meta name="description" content="NYC displacement risk scores for 178 neighborhoods, updated daily from ACRIS deeds, HPD violations, DOB permits, evictions, and rent stabilization data.">
    <link rel="canonical" href="https://pulsecities.com/">

    <meta property="og:title" content="PulseCities: NYC Displacement Risk Intelligence">
    <meta property="og:description" content="Real-time displacement risk scores for all 178 NYC neighborhoods, built on six public data signals: ACRIS deed transfers, HPD violations, DOB permits, eviction filings, rent stabilization loss, and assessment spikes.">
    <meta property="og:url" content="https://pulsecities.com/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://pulsecities.com/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PulseCities: NYC Displacement Risk Intelligence">
    <meta name="twitter:description" content="Real-time displacement risk scores for all 178 NYC neighborhoods, built on six public data signals.">
    <meta name="twitter:image" content="https://pulsecities.com/og-image.png">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "PulseCities",
        "description": "Real-time displacement risk intelligence for all 178 NYC neighborhoods, built on six public data signals.",
        "url": "https://pulsecities.com",
        "applicationCategory": "DataVisualization",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "Michael Espin" },
        "about": { "@type": "Thing", "name": "NYC Housing Displacement" }
    }
    </script>

    <!-- Redirect /neighborhood/{zip} deep links to the app -->
    <script>(function(){var m=location.pathname.match(/^\/neighborhood\/(\d{5})$/);if(m)location.replace('/app.html?q='+m[1]);})();</script>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a2e'/%3E%3Cpolyline points='2,16 7,16 10,9 13,23 16,13 19,19 22,16 30,16' fill='none' stroke='%23f97316' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

    <script async src="https://plausible.io/js/pa-U5kR6cdEChGa28HrQF_3J.js"></script>
    <script>
        window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
        plausible.init()
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            /* Heat-map glow positioned to approximate NYC's borough geography,
               layered over a subtle street-grid pattern. No map library needed. */
            background-color: #0f172a;
            background-image:
                radial-gradient(ellipse 65% 45% at 40% 60%, rgba(249,115,22,0.09) 0%, transparent 55%),
                radial-gradient(ellipse 38% 28% at 72% 28%, rgba(239,68,68,0.06) 0%, transparent 50%),
                radial-gradient(ellipse 50% 20% at 50% 46%, rgba(234,179,8,0.04) 0%, transparent 60%),
                linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.02) 1px, transparent 1px),
                linear-gradient(rgba(56,189,248,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.008) 1px, transparent 1px);
            background-size:
                100% 100%, 100% 100%, 100% 100%,
                80px 80px, 80px 80px,
                16px 16px, 16px 16px;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 1.0; }
        }
        .pulse-dot { animation: pulse-dot 2.5s ease-in-out infinite; }

        .zip-card { transition: border-color 0.15s, background 0.15s; }
        .zip-card:hover { border-color: rgba(148,163,184,0.5) !important; }
    </style>
</head>
<body>
    <div class="min-h-dvh flex flex-col items-center justify-center px-4 py-10 relative">

        <button id="lang-toggle"
                class="absolute top-4 right-4 font-mono text-xs text-slate-400 hover:text-slate-100 transition-colors"
                style="min-height:36px;min-width:52px;background:none;border:none;cursor:pointer;">
            EN / ES
        </button>

        <div class="flex flex-col items-center w-full max-w-lg">

            <h1 class="font-mono font-semibold mb-2" style="font-size:2.2rem;color:#38bdf8;letter-spacing:-0.02em;">
                PulseCities
            </h1>
            <p class="text-base text-slate-300 mb-10 text-center" style="max-width:36ch;">
                The displacement story NYC doesn't officially tell.
            </p>

            <!-- Desktop stats: 3-column editorial layout -->
            <div class="hidden md:grid md:grid-cols-3 gap-8 mb-6 w-full" id="stats-desktop">
                <div id="stat-left" class="text-center" style="opacity:0;transform:translateY(8px);">
                    <div id="llc-count" class="text-4xl font-mono font-bold text-slate-100" style="letter-spacing:-0.02em;">&#8212;</div>
                    <div class="text-xs text-slate-400 mt-1">LLC transfers (30d)</div>
                </div>
                <div id="stat-center" class="text-center" style="opacity:0;transform:translateY(8px);">
                    <div id="zip-code" class="font-mono font-bold text-slate-100" style="font-size:2.8rem;letter-spacing:-0.02em;">&#8212;</div>
                    <div id="zip-place" class="text-xs text-slate-400 mt-0.5">&#8212;</div>
                    <div class="flex items-center justify-center gap-1.5 mt-1">
                        <span id="zip-score" class="font-mono text-sm font-semibold" style="color:#f97316;">&#8212;</span>
                        <span class="pulse-dot text-xs" style="color:#f97316;">&#9679;</span>
                    </div>
                </div>
                <div id="stat-right" class="text-center" style="opacity:0;transform:translateY(8px);">
                    <div id="eviction-count" class="text-4xl font-mono font-bold text-slate-100" style="letter-spacing:-0.02em;">&#8212;</div>
                    <div class="text-xs text-slate-400 mt-1">evictions (30d)</div>
                </div>
            </div>

            <!-- Mobile stats: highest-risk ZIP first, LLC + evictions below -->
            <div class="flex flex-col items-center gap-5 mb-6 w-full md:hidden">
                <div class="text-center">
                    <div class="text-xs font-mono uppercase tracking-widest mb-1" style="color:#94a3b8;letter-spacing:0.1em;">highest risk zip</div>
                    <div class="font-mono font-bold text-slate-100" style="font-size:2.2rem;letter-spacing:-0.02em;" data-bind="zip-code">&#8212;</div>
                    <div class="text-xs mt-0.5 text-slate-300" data-bind="zip-place">&#8212;</div>
                    <div class="flex items-center justify-center gap-1.5 mt-1">
                        <span class="font-mono text-sm font-semibold" style="color:#f97316;" data-bind="zip-score">&#8212;</span>
                        <span class="pulse-dot text-xs" style="color:#f97316;">&#9679;</span>
                    </div>
                </div>
                <div class="flex gap-8">
                    <div class="text-center">
                        <div class="text-2xl font-mono font-bold text-slate-100" data-bind="llc-count">&#8212;</div>
                        <div class="text-xs mt-1 text-slate-300">LLC transfers (30d)</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-mono font-bold text-slate-100" data-bind="eviction-count">&#8212;</div>
                        <div class="text-xs mt-1 text-slate-300">evictions (30d)</div>
                    </div>
                </div>
            </div>

            <p id="hook-line" class="text-sm text-slate-400 text-center mb-8 px-2"
               style="max-width:38ch;opacity:0;transform:translateY(8px);transition:opacity 0.2s ease-out,transform 0.2s ease-out;"></p>

            <!-- Search -->
            <div class="flex flex-col w-full gap-2 mb-4">
                <div class="flex gap-2 w-full">
                    <input id="search-input"
                           type="text"
                           inputmode="search"
                           placeholder="Enter address, ZIP, or landlord name"
                           class="input input-bordered flex-1 text-sm font-mono"
                           style="background:rgba(30,41,59,0.9);"
                           autocomplete="off" />
                    <button id="search-btn"
                            class="btn shrink-0"
                            style="background-color:#f59e0b;border-color:#f59e0b;color:#1a1a2e;font-weight:600;">
                        Search
                    </button>
                </div>
                <div class="flex items-center justify-between px-1">
                    <a href="/app.html" class="text-sm text-slate-400 hover:text-slate-100 transition-colors">
                        or, explore the map &#8594;
                    </a>
                    <a href="https://www.linkedin.com/in/michaelespin"
                       target="_blank" rel="noopener noreferrer"
                       class="flex items-center gap-1 text-xs text-slate-500 hover:text-[#0A66C2] transition-colors duration-150"
                       aria-label="Michael Espin on LinkedIn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="11" height="11" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                        Built by Michael Espin
                    </a>
                </div>
            </div>

            <!-- Live top-risk ZIP cards -->
            <div id="zip-cards" class="flex flex-wrap gap-3 justify-center w-full mt-2"></div>

        </div>
    </div>

    <script>
        const _lang = localStorage.getItem('pc-lang') || 'en';

        function scoreColor(score) {
            if (score == null) return '#94a3b8';
            if (score >= 70) return '#ef4444';
            if (score >= 40) return '#f97316';
            if (score >= 15) return '#eab308';
            return '#22c55e';
        }

        function countUpInt(el, target, duration) {
            const t0 = performance.now();
            (function step(now) {
                const p = Math.min((now - t0) / duration, 1);
                el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3))).toLocaleString();
                if (p < 1) requestAnimationFrame(step);
            })(t0);
        }

        function syncBind(key, value) {
            document.querySelectorAll(`[data-bind="${key}"]`).forEach(el => el.textContent = value);
        }

        function fadeIn(el) {
            if (!el) return;
            el.style.transition = 'opacity 0.2s ease-out, transform 0.2s ease-out';
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
        }

        function buildHookLine(llc, evictions) {
            if (!llc && !evictions) return '';
            if (evictions > 0 && llc / evictions > 1.5)
                return `${(llc / evictions).toFixed(1)} LLC transfers for every eviction filed this month.`;
            return `${llc.toLocaleString()} LLC transfers and ${evictions.toLocaleString()} eviction filings in the last 30 days.`;
        }

        function populateStats(data) {
            const llc      = data.llc_transfers_30d || 0;
            const evictions = data.evictions_30d    || 0;
            const top       = data.top_risk;

            if (top) {
                const color = scoreColor(top.score);
                const zip   = top.zip_code || '&#8212;';
                const place = top.name     || '&#8212;';
                const score = top.score != null ? top.score.toFixed(1) : '&#8212;';

                document.getElementById('zip-code').textContent  = zip;
                document.getElementById('zip-place').textContent = place;
                const scoreEl = document.getElementById('zip-score');
                scoreEl.style.color = color;
                scoreEl.textContent = score;

                syncBind('zip-code',  zip);
                syncBind('zip-place', place);
                document.querySelectorAll('[data-bind="zip-score"]').forEach(el => {
                    el.style.color = color;
                    el.textContent = score;
                });
            }

            // Cascade: center → left → right → hook
            setTimeout(() => fadeIn(document.getElementById('stat-center')), 0);
            setTimeout(() => {
                fadeIn(document.getElementById('stat-left'));
                countUpInt(document.getElementById('llc-count'), llc, 400);
                syncBind('llc-count', llc.toLocaleString());
            }, 350);
            setTimeout(() => {
                fadeIn(document.getElementById('stat-right'));
                countUpInt(document.getElementById('eviction-count'), evictions, 400);
                syncBind('eviction-count', evictions.toLocaleString());
            }, 500);
            setTimeout(() => {
                const text = buildHookLine(llc, evictions);
                const el   = document.getElementById('hook-line');
                if (text && el) { el.textContent = text; fadeIn(el); }
            }, 680);
        }

        function renderZipCards(list) {
            const container = document.getElementById('zip-cards');
            if (!container || !list) return;
            list.forEach(n => {
                const color = scoreColor(n.score);
                const card  = document.createElement('a');
                card.href        = `/app.html?q=${encodeURIComponent(n.zip_code)}`;
                card.className   = 'zip-card text-left rounded-lg border border-slate-700 px-4 py-3 block';
                card.style.cssText = 'background:rgba(30,41,59,0.7);min-width:min(160px,calc(50vw - 24px));max-width:200px;text-decoration:none;';
                card.innerHTML = `
                    <div class="flex items-baseline gap-2 mb-0.5">
                        <span class="text-xs font-mono text-slate-500">#${n.rank}</span>
                        <span class="font-mono text-sm font-bold text-slate-100">${n.zip_code}</span>
                    </div>
                    <div class="text-xs text-slate-400 truncate mb-1">${n.name || ''}</div>
                    <div class="font-mono text-sm font-semibold" style="color:${color};">${n.score != null ? n.score.toFixed(1) : '&#8212;'}</div>
                `;
                container.appendChild(card);
            });
        }

        fetch('/api/stats')
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (!data) return;
                populateStats(data);
                renderZipCards(data.top_risk_list || []);
            })
            .catch(() => {});

        function handleSearch() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) return;
            window.location.href = `/app.html?q=${encodeURIComponent(q)}`;
        }

        document.getElementById('search-btn').addEventListener('click', handleSearch);
        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSearch();
        });

        const langToggle = document.getElementById('lang-toggle');
        langToggle.textContent = _lang === 'es' ? 'ES / EN' : 'EN / ES';
        langToggle.addEventListener('click', () => {
            const next = _lang === 'en' ? 'es' : 'en';
            localStorage.setItem('pc-lang', next);
            langToggle.textContent = next === 'es' ? 'ES / EN' : 'EN / ES';
        });
    </script>
</body>
</html>
