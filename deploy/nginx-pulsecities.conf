upstream pulsecities_upstream {
    server unix:/tmp/gunicorn.sock fail_timeout=0;
}

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pulsecities.com;

    # Webroot location for Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /root/pulsecities/frontend;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pulsecities.com;

    # TLS — Let's Encrypt certificate (provisioned in Task 2)
    ssl_certificate /etc/letsencrypt/live/pulsecities.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulsecities.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Versioned static assets — long cache, immutable
    location ~* \.(css|js|woff|woff2|ttf|eot|svg|png|jpg|gif|ico)$ {
        root /root/pulsecities/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Neighborhood deep links — serve app shell, JS handles the zip from the path
    location /neighborhood/ {
        root /root/pulsecities/frontend;
        try_files /app.html =404;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
    }

    # Operator profile pages — SPA shell served from operator.html
    location /operator/ {
        root /root/pulsecities/frontend;
        try_files /operator.html =404;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
    }

    # HTML — never cache (browser must always re-fetch for deployments to land)
    location / {
        root /root/pulsecities/frontend;
        try_files $uri /index.html;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
    }

    # API — proxy to gunicorn with real IP forwarding
    location /api/ {
        proxy_pass http://pulsecities_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
