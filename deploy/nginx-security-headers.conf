# Security headers for pulsecities.com.
# Installed at /etc/nginx/snippets/pulsecities-security-headers.conf.
#
# nginx add_header inheritance is all-or-nothing: a location that sets any
# header of its own silently drops every server-level add_header. Every
# location that touches Cache-Control therefore includes this snippet, and the
# server block includes it for the locations that don't.
#
# HSTS is kept at one day deliberately: long enough to matter, short enough to
# back out of within a day if TLS ever has to come down.
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options DENY always;
add_header Strict-Transport-Security "max-age=86400" always;
